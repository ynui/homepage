name: Deploy Example

on:
  push:
    branches: [ main ]
    paths:
      - 'build.py'
      - 'services.example.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Build example
      run: python3 build.py --example
    - name: Commit example.html
      run: |
        if ! git diff --quiet example.html; then
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add example.html
          git commit -m "Update example.html"
          git push
        fi
    - name: Prepare artifact
      run: mkdir _site && cp example.html _site/index.html
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
