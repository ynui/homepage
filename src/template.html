<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{__TITLE__}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
  <style>
{{__CSS__}}
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="headerTitle">{{__HEADER__}}</h1>
      <div class="time" id="time"></div>
      <div class="date" id="date"></div>
      <input type="text" id="search" class="search" placeholder="Search...">
    </header>
    <div class="grid">
{{__SERVICES__}}
    </div>
    <div class="bottom-bar">
      <div class="group-indicator" id="groupIndicator">
        <span class="group-label">Group:</span>
        <span class="group-value" id="groupValue"></span>
        <div class="group-selector" id="groupSelector">
          <!-- Dynamic options rendered by JS from window.GROUPS -->
        </div>
      </div>
      <footer class="hints-footer">
        <span class="hint" id="hintSettings"><span class="key">,</span> settings</span>
        <span class="hint" id="hintHelp"><span class="key">?</span> help</span>
      </footer>
      <div class="settings">
        <button id="settingsBtn" class="settings-btn">⚙</button>
        <div id="settingsDropdown" class="settings-dropdown" tabindex="0">
          <button id="themeToggle" class="settings-option"><span class="label">Theme</span><span class="value">🌙</span></button>
          <button id="groupToggle" class="settings-option"><span class="label">Group</span><span class="value">All</span></button>
          <button id="clockToggle" class="settings-option"><span class="label">Clock</span><span class="value">24h</span></button>
          <button id="dateToggle" class="settings-option"><span class="label">Date</span><span class="value">On</span></button>
          <button id="searchToggle" class="settings-option"><span class="label">Search</span><span class="value">On</span></button>
          <button id="iconToggle" class="settings-option"><span class="label">Icons</span><span class="value">On</span></button>
          <button id="compactToggle" class="settings-option"><span class="label">Compact</span><span class="value">Off</span></button>
          <button id="clearOrder" class="settings-option">Clear custom order</button>
          <button id="resetAll" class="settings-option">Reset all settings</button>
        </div>
      </div>
    </div>
  </main>
  <div class="toast" id="toast">Copied!</div>
  <div class="hints" id="hints">
    <h2>Keyboard Shortcuts</h2>
    <div class="hint-row"><span class="key">↑↓←→</span><span>Navigate apps</span></div>
    <div class="hint-row"><span class="key">Enter</span><span>Open selected</span></div>
    <div class="hint-row"><span class="key">/</span><span>Cycle group</span></div>
    <div class="hint-row"><span class="key">,</span><span>Open settings</span></div>
    <div class="hint-row"><span class="key">Type</span><span>Search apps</span></div>
    <div class="hint-row"><span class="key">Esc</span><span>Clear / Close</span></div>
    <div class="hint-row"><span class="key">?</span><span>Show shortcuts</span></div>
  </div>
  <script>
window.GROUPS = {{__GROUPS_JSON__}};
{{__JS__}}
  </script>
</body>
</html>
